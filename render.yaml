# Render Blueprint at repo root — points to api/
services:
  - type: web
    name: license-loader-api
    runtime: python
    rootDir: api
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.8"
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USERNAME
        value: admin
      - key: ADMIN_PASSWORD
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: license-loader-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false

databases:
  - name: license-loader-db
    plan: free
